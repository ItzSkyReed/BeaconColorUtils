name: Publish Release
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.rid }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Windows
          - os: windows-latest
            rid: win-x64
            ext: zip
          - os: windows-latest
            rid: win-arm64
            ext: zip
          # macOS
          - os: macos-latest
            rid: osx-x64
            ext: tar.gz
          - os: macos-latest
            rid: osx-arm64
            ext: tar.gz
          # Linux
          - os: ubuntu-latest
            rid: linux-x64
            ext: tar.gz
          - os: ubuntu-latest
            rid: linux-arm64
            ext: tar.gz

    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Restore Dependencies
        run: dotnet restore -r ${{ matrix.rid }}

      - name: Publish ${{ matrix.rid }}
        run: dotnet publish BeaconColorUtils.UI/BeaconColorUtils.UI.csproj -c Release -r ${{ matrix.rid }} --no-restore -o ./publish-output

      - name: Create ZIP Archive (Windows)
        if: runner.os == 'Windows'
        run: Compress-Archive -Path ./publish-output/* -DestinationPath BeaconColorUtils-${{ matrix.rid }}.zip

      - name: Create TAR.GZ Archive (Unix)
        if: runner.os != 'Windows'
        run: tar -czvf BeaconColorUtils-${{ matrix.rid }}.tar.gz -C ./publish-output .

      - name: Upload Artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.rid }}-archive
          path: BeaconColorUtils-${{ matrix.rid }}.${{ matrix.ext }}
          retention-days: 1

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download All Artifacts
        uses: actions/download-artifact@v8
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          files: release-artifacts/*
          generate_release_notes: true
          draft: false
          prerelease: false